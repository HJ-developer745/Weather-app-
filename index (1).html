<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WEATHER APP</title>

  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: url('images/background.jpg');
      background-size: cover;
      background-position: center;
      background-color: #06283D; /* Fallback color */
    }

    .container {
      position: relative;
      width: 400px;
      height: 105px; /* Initial height for search only */
      background: rgba(255, 255, 255, .1);
      backdrop-filter: blur(30px);
      border: 2px solid rgba(255, 255, 255, .2);
      border-radius: 16px;
      padding: 20px;
      color: #fff;
      transition: height 0.6s ease;
      overflow: hidden;
    }

    .search-box {
      position: relative;
      width: 100%;
      height: 55px;
      display: flex;
      align-items: center;
    }

    .search-box i {
      position: absolute;
      left: 10px;
      font-size: 28px;
      z-index: 10;
    }

    .search-box input {
      position: absolute;
      width: 100%;
      height: 100%;
      background: transparent;
      border: 2px solid rgba(255, 255, 255, .5);
      outline: none;
      border-radius: 10px;
      font-size: 20px;
      color: #fff;
      font-weight: 500;
      text-transform: uppercase;
      padding: 0 48px 0 42px;
    }

    .search-box input::placeholder {
      color: #fff;
      text-transform: capitalize;
    }

    .search-box button {
      position: absolute;
      right: 0;
      width: 45px;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-size: 28px;
      color: #fff;
      cursor: pointer;
    }

    .weather-box {
      text-align: center;
      margin: 30px 0;
      display: none;
    }

    .weather-box img {
      width: 50%;
    }

    .weather-box .temperature {
      position: relative;
      font-size: 64px;
      line-height: 1;
      font-weight: 700;
      margin: 15px 0;
    }

    .weather-box .temperature span {
      position: absolute;
      font-size: 24px;
      margin-left: 4px;
    }

    .weather-box .description {
      font-size: 22px;
      font-weight: 500;
      text-transform: capitalize;
    }

    /* Tomorrow Forecast Styling */
    .tomorrow-forecast {
      display: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 15px;
      margin: 20px 0;
      text-align: center;
    }

    .forecast-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .forecast-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .forecast-info img {
      width: 50px;
    }

    .forecast-temp {
      font-size: 24px;
      font-weight: 700;
    }

    .forecast-desc {
      font-size: 13px;
      text-transform: capitalize;
      opacity: 0.8;
    }

    .weather-details {
      width: 100%;
      display: none;
      justify-content: space-between;
      margin-top: 20px;
    }

    .weather-details .humidity,
    .weather-details .wind {
      display: flex;
      align-items: center;
      width: 50%;
    }

    .weather-details i {
      font-size: 40px;
      margin-right: 10px;
    }

    .weather-details span {
      font-size: 20px;
      font-weight: 500;
    }

    .weather-details p {
      font-size: 12px;
    }

    .not-found {
      width: 100%;
      text-align: center;
      margin-top: 50px;
      display: none;
    }

    .not-found img {
      width: 70%;
    }

    .not-found p {
      color: #fff;
      font-size: 18px;
      font-weight: 500;
      margin-top: 12px;
    }

    .fadeIn {
      animation: 0.5s fadeIn forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="search-box">
      <i class='bx bxs-map'></i>
      <input type="text" placeholder="Enter your location">
      <button class='bx bx-search'></button>
    </div>

    <div class="not-found">
      <img src="images/404.png">
      <p>Oops! Location not found!</p>
    </div>

    <div class="weather-box">
      <img src="images/cloud.png">
      <p class="temperature">0<span>°C</span></p>
      <p class="description">Broken Clouds</p>
    </div>

    <div class="tomorrow-forecast">
      <p class="forecast-title">Tomorrow's Forecast</p>
      <div class="forecast-info">
        <img src="images/cloud.png" id="tomorrow-icon">
        <div class="forecast-text">
          <p class="forecast-temp">0°C</p>
          <p class="forecast-desc">Clear Sky</p>
        </div>
      </div>
    </div>

    <div class="weather-details">
      <div class="humidity">
        <i class='bx bx-water'></i>
        <div class="text">
          <span id="humidity-val">0%</span>
          <p>Humidity</p>
        </div>
      </div>
      <div class="wind">
        <i class='bx bx-wind'></i>
        <div class="text">
          <span id="wind-val">0Km/h</span>
          <p>Wind Speed</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const container = document.querySelector('.container');
    const search = document.querySelector('.search-box button');
    const weatherBox = document.querySelector('.weather-box');
    const weatherDetails = document.querySelector('.weather-details');
    const forecastBox = document.querySelector('.tomorrow-forecast');
    const error404 = document.querySelector('.not-found');

    search.addEventListener('click', () => {
      const APIkey = '7029953f584371e47d5d78fcdff80a6d';
      const city = document.querySelector('.search-box input').value;

      if (city === '') return;

      // 1. Fetch Current Weather
      fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${APIkey}`)
        .then(response => response.json())
        .then(json => {

          if (json.cod === '404') {
            container.style.height = '430px';
            weatherBox.style.display = 'none';
            weatherDetails.style.display = 'none';
            forecastBox.style.display = 'none';
            error404.style.display = 'block';
            error404.classList.add('fadeIn');
            return;
          }

          error404.style.display = 'none';
          error404.classList.remove('fadeIn');

          const image = document.querySelector('.weather-box img');
          const temperature = document.querySelector('.weather-box .temperature');
          const description = document.querySelector('.weather-box .description');
          const humidity = document.querySelector('#humidity-val');
          const wind = document.querySelector('#wind-val');

          // Image mapping
          const setWeatherIcon = (condition) => {
            switch (condition) {
              case 'Clear': return 'images/clear.png';
              case 'Rain': return 'images/rain.png';
              case 'Snow': return 'images/snow.png';
              case 'Clouds': return 'images/cloud.png';
              case 'Haze':
              case 'Mist': return 'images/mist.png';
              default: return 'images/cloud.png';
            }
          };

          image.src = setWeatherIcon(json.weather[0].main);
          temperature.innerHTML = `${parseInt(json.main.temp)}<span>°C</span>`;
          description.innerHTML = `${json.weather[0].description}`;
          humidity.innerHTML = `${json.main.humidity}%`;
          wind.innerHTML = `${parseInt(json.wind.speed)}Km/h`;

          // 2. Fetch Tomorrow's Forecast
          fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${APIkey}`)
            .then(res => res.json())
            .then(forecastData => {
              // list[8] is roughly 24 hours later (8 * 3-hour intervals)
              const tomorrow = forecastData.list[8];

              const tomorrowIcon = document.querySelector('#tomorrow-icon');
              const tomorrowTemp = document.querySelector('.forecast-temp');
              const tomorrowDesc = document.querySelector('.forecast-desc');

              tomorrowIcon.src = setWeatherIcon(tomorrow.weather[0].main);
              tomorrowTemp.innerHTML = `${parseInt(tomorrow.main.temp)}°C`;
              tomorrowDesc.innerHTML = tomorrow.weather[0].description;

              // Display sections and adjust container
              weatherBox.style.display = 'block';
              weatherDetails.style.display = 'flex';
              forecastBox.style.display = 'block';
              
              weatherBox.classList.add('fadeIn');
              weatherDetails.classList.add('fadeIn');
              forecastBox.classList.add('fadeIn');
              
              container.style.height = '750px';
            });
        });
    });
  </script>
</body>

</html>
